name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers workflow when a tag like 'v0.1.0' is pushed

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a GitHub Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install Dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Run Lint
        run: bun run lint

      - name: Build Standalone Binaries
        run: bun run build:all-binaries

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3 # pin when SHA is available
        with:
          generate_release_notes: true
          files: |
            dist/adotui-linux-x64
            dist/adotui-linux-arm64
            dist/adotui-windows-x64.exe
            dist/adotui-windows-arm64.exe
            dist/adotui-macos-x64
            dist/adotui-macos-arm64

      - name: Checkout main and Generate Homebrew Formula
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout main

          VERSION=${GITHUB_REF_NAME#v}
          MAC_X64_SHA=$(shasum -a 256 dist/adotui-macos-x64 | awk '{print $1}')
          MAC_ARM_SHA=$(shasum -a 256 dist/adotui-macos-arm64 | awk '{print $1}')
          LINUX_X64_SHA=$(shasum -a 256 dist/adotui-linux-x64 | awk '{print $1}')
          LINUX_ARM_SHA=$(shasum -a 256 dist/adotui-linux-arm64 | awk '{print $1}')
          
          mkdir -p Formula
          cat <<EOF > Formula/adotui.rb
          class Adotui < Formula
            desc "Terminal UI for managing Azure DevOps pull requests"
            homepage "https://github.com/techniumlabs/adotui"
            version "$VERSION"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/techniumlabs/adotui/releases/download/v$VERSION/adotui-macos-x64"
                sha256 "$MAC_X64_SHA"
              elsif Hardware::CPU.arm?
                url "https://github.com/techniumlabs/adotui/releases/download/v$VERSION/adotui-macos-arm64"
                sha256 "$MAC_ARM_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/techniumlabs/adotui/releases/download/v$VERSION/adotui-linux-x64"
                sha256 "$LINUX_X64_SHA"
              elsif Hardware::CPU.arm?
                url "https://github.com/techniumlabs/adotui/releases/download/v$VERSION/adotui-linux-arm64"
                sha256 "$LINUX_ARM_SHA"
              end
            end

            def install
              if OS.mac? && Hardware::CPU.intel?
                bin.install "adotui-macos-x64" => "adotui"
              elsif OS.mac? && Hardware::CPU.arm?
                bin.install "adotui-macos-arm64" => "adotui"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install "adotui-linux-x64" => "adotui"
              elsif OS.linux? && Hardware::CPU.arm?
                bin.install "adotui-linux-arm64" => "adotui"
              end
            end
          end
          EOF

          git add Formula/adotui.rb
          git commit -m "chore: update homebrew formula for ${{ github.ref_name }} [skip ci]" || true
          git push origin main